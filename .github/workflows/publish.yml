name: Manual Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to PyPI and create the GitHub Release
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --dev
      - run: uv run pytest tests/cn
      - run: uv run ruff check code_puppy tests/cn scripts
      - run: uv build
      - name: Verify package metadata
        run: uvx twine check dist/*
      - name: Install wheel in a clean environment
        run: uv run --no-project python scripts/smoke_package.py dist/*.whl
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version="$(uv run --no-project python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          if [[ "${{ inputs.publish }}" == "true" ]] &&
             git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: code-puppy-cn-${{ steps.release.outputs.version }}
          path: dist/*
          if-no-files-found: error
      - name: Publish with trusted publishing
        if: ${{ inputs.publish }}
        run: uv publish
      - name: Create GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: >-
          gh release create "$RELEASE_TAG" dist/*
          --target "$GITHUB_SHA"
          --generate-notes
          --title "Code Puppy CN $RELEASE_TAG"
