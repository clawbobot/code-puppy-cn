name: Manual Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to PyPI after building
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --dev
      - run: uv run pytest tests/cn
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: code-puppy-cn-dist
          path: dist/*
      - name: Publish with trusted publishing
        if: ${{ inputs.publish }}
        run: uv publish
