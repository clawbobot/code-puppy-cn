name: Manual Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to PyPI after building
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --dev
      - run: uv run pytest tests/cn
      - run: uv run ruff check code_puppy tests/cn scripts
      - run: uv build
      - name: Verify package metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: code-puppy-cn-dist
          path: dist/*
      - name: Publish with trusted publishing
        if: ${{ inputs.publish }}
        run: uv publish
