name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-platform:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.13"
          - os: ubuntu-latest
            python: "3.14"
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --dev
      - run: uv run pytest tests/cn
      - run: uv run python -m code_puppy.cn_doctor --json --no-network

  upstream-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check code_puppy tests/cn
      - run: uv run pytest tests --ignore tests/integration

  package:
    name: Build distribution packages
    needs:
      - cross-platform
      - upstream-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv build
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: code-puppy-cn-dist
          path: dist/*
          if-no-files-found: error
